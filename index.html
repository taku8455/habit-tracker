<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FITNESS TRACKER</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;700;800&family=Noto+Sans+JP:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', 'Noto Sans JP', sans-serif; -webkit-tap-highlight-color: transparent; }
        .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased flex flex-col h-screen overflow-hidden">

    <header class="bg-white/80 backdrop-blur-md border-b border-slate-200/80 pt-8 pb-4 px-6 shrink-0 z-50 shadow-sm">
        <h1 id="page-title" class="text-xl font-extrabold tracking-wider text-center uppercase text-indigo-600">WEIGHT LOG</h1>
    </header>

    <main class="flex-1 overflow-y-auto p-4 pb-28">
        
        <div id="tab-weight" class="tab-content space-y-4">
            <div class="bg-white p-5 rounded-2xl border border-slate-100 shadow-sm">
                <h2 class="text-xs font-bold tracking-wider text-slate-400 uppercase mb-3">Log Weight</h2>
                <div class="flex items-center space-x-3">
                    <input type="number" id="weight-input" step="0.1" placeholder="65.0" class="flex-1 bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-lg font-bold text-slate-900 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:bg-white transition">
                    <span class="text-lg font-extrabold text-slate-500">kg</span>
                </div>
                <button onclick="saveWeight()" class="w-full mt-4 bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3.5 rounded-xl shadow-md active:scale-[0.98] transition tracking-wide font-sans">SAVE LOG</button>
            </div>
            <div class="bg-white p-5 rounded-2xl border border-slate-100 shadow-sm">
                <canvas id="weightChart" class="w-full h-48"></canvas>
            </div>
        </div>

        <div id="tab-training" class="tab-content space-y-4 hidden">
            <div class="bg-white p-5 rounded-2xl border border-slate-100 shadow-sm space-y-5">
                <h2 class="text-xs font-bold tracking-wider text-slate-400 uppercase">Select Categories</h2>
                
                <div class="grid grid-cols-3 gap-2">
                    <button onclick="toggleCategory('chest')" id="cat-chest" class="py-3 px-2 rounded-xl border border-slate-200 font-bold text-xs tracking-wider uppercase bg-slate-50 text-slate-600 active:scale-[0.95] transition">Chest</button>
                    <button onclick="toggleCategory('shoulder')" id="cat-shoulder" class="py-3 px-2 rounded-xl border border-slate-200 font-bold text-xs tracking-wider uppercase bg-slate-50 text-slate-600 active:scale-[0.95] transition">Shoulder</button>
                    <button onclick="toggleCategory('back')" id="cat-back" class="py-3 px-2 rounded-xl border border-slate-200 font-bold text-xs tracking-wider uppercase bg-slate-50 text-slate-600 active:scale-[0.95] transition">Back</button>
                    <button onclick="toggleCategory('triceps')" id="cat-triceps" class="py-3 px-2 rounded-xl border border-slate-200 font-bold text-xs tracking-wider uppercase bg-slate-50 text-slate-600 active:scale-[0.95] transition">Triceps</button>
                    <button onclick="toggleCategory('biceps')" id="cat-biceps" class="py-3 px-2 rounded-xl border border-slate-200 font-bold text-xs tracking-wider uppercase bg-slate-50 text-slate-600 active:scale-[0.95] transition">Biceps</button>
                    <button onclick="toggleCategory('legs')" id="cat-legs" class="py-3 px-2 rounded-xl border border-slate-200 font-bold text-xs tracking-wider uppercase bg-slate-50 text-slate-600 active:scale-[0.95] transition">Legs</button>
                </div>
                <div class="w-full">
                    <button onclick="toggleCategory('running')" id="cat-running" class="w-full py-3 rounded-xl border border-slate-200 font-bold text-xs tracking-wider uppercase bg-slate-50 text-slate-600 active:scale-[0.98] transition">🏃 Running</button>
                </div>

                <div id="weight-fields" class="hidden space-y-2 bg-slate-50 p-4 rounded-xl border border-slate-100">
                    <label class="text-xs font-bold tracking-wider text-slate-500 uppercase block">Total Sets (Selected Parts)</label>
                    <div class="flex items-center space-x-3">
                        <input type="number" id="workout-sets" placeholder="15" class="flex-1 bg-white border border-slate-200 rounded-xl px-4 py-2 text-slate-900 text-center font-bold">
                        <span class="text-sm font-bold text-slate-500">sets</span>
                    </div>
                </div>

                <div id="running-fields" class="hidden space-y-3 bg-slate-50 p-4 rounded-xl border border-slate-100">
                    <h3 class="text-xs font-bold tracking-wider text-indigo-600 uppercase">Running Stats</h3>
                    <div class="grid grid-cols-3 gap-2">
                        <div>
                            <label class="text-[10px] text-slate-400 font-bold block mb-1 text-center">Distance</label>
                            <input type="number" id="run-distance" step="0.01" placeholder="5.0" class="w-full bg-white border border-slate-200 rounded-xl p-2 text-center text-slate-900 font-bold text-sm">
                            <span class="text-[10px] text-slate-400 block text-center mt-1">km</span>
                        </div>
                        <div>
                            <label class="text-[10px] text-slate-400 font-bold block mb-1 text-center">Time</label>
                            <input type="text" id="run-time" placeholder="25:00" class="w-full bg-white border border-slate-200 rounded-xl p-2 text-center text-slate-900 font-bold text-sm">
                            <span class="text-[10px] text-slate-400 block text-center mt-1">mm:ss</span>
                        </div>
                        <div>
                            <label class="text-[10px] text-slate-400 font-bold block mb-1 text-center">Pace</label>
                            <input type="text" id="run-pace" placeholder="5:00" class="w-full bg-white border border-slate-200 rounded-xl p-2 text-center text-slate-900 font-bold text-sm">
                            <span class="text-[10px] text-slate-400 block text-center mt-1">/km</span>
                        </div>
                    </div>
                </div>

                <button onclick="saveTraining()" class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-4 rounded-xl shadow-md active:scale-[0.98] transition tracking-wide uppercase">Check In Workout</button>
            </div>

            <div class="bg-white p-4 rounded-2xl border border-slate-100 shadow-sm text-center">
                <span id="gym-status" class="text-slate-400 font-bold text-sm tracking-wide uppercase">No Workout Logged Today</span>
            </div>
        </div>

        <div id="tab-meal" class="tab-content space-y-4 hidden">
            <div class="flex bg-slate-200/60 p-1 rounded-xl">
                <button onclick="switchMealSubTab('log')" id="sub-btn-log" class="flex-1 py-2 rounded-lg text-xs font-bold transition bg-white text-indigo-600 shadow-sm">Log Meal (記録)</button>
                <button onclick="switchMealSubTab('db')" id="sub-btn-db" class="flex-1 py-2 rounded-lg text-xs font-bold transition text-slate-500">Manage DB (登録)</button>
            </div>

            <div id="meal-sub-log" class="space-y-4">
                <div class="bg-white p-5 rounded-2xl border border-slate-100 shadow-sm space-y-4">
                    <h2 class="text-xs font-bold tracking-wider text-slate-400 uppercase">Track Today's Meal</h2>
                    
                    <div class="grid grid-cols-2 gap-2">
                        <div>
                            <label class="text-[10px] text-indigo-600 font-bold block mb-1 tracking-wider uppercase">Target Meal</label>
                            <select id="food-meal-slot" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-2 py-3 text-xs text-slate-800 focus:outline-none focus:ring-2 focus:ring-indigo-500 font-bold">
                                <option value="Meal 1">Meal 1</option>
                                <option value="Meal 2">Meal 2</option>
                                <option value="Meal 3">Meal 3</option>
                                <option value="Meal 4">Meal 4</option>
                                <option value="Meal 5">Meal 5</option>
                                <option value="Meal 6">Meal 6</option>
                            </select>
                        </div>
                        <div>
                            <label class="text-[10px] text-slate-400 font-bold block mb-1 tracking-wider uppercase">Select From Your DB</label>
                            <select id="food-preset" onchange="onPresetChange()" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-2 py-3 text-xs text-slate-800 focus:outline-none focus:ring-2 focus:ring-indigo-500 font-semibold">
                                </select>
                        </div>
                    </div>

                    <div id="amount-field" class="bg-slate-50 p-3 rounded-xl border border-slate-100 space-y-1">
                        <label class="text-[10px] text-slate-500 font-bold block tracking-wider uppercase">Amount / Quantity</label>
                        <div class="flex items-center space-x-2">
                            <input type="number" id="food-amount" value="100" oninput="calculateMacrosByAmount()" class="w-full bg-white border border-slate-200 rounded-lg p-2 text-slate-900 font-bold text-sm text-center">
                            <span id="amount-unit" class="text-xs font-bold text-slate-400 min-w-[40px]">g / 個</span>
                        </div>
                    </div>

                    <input type="text" id="food-name" placeholder="Menu Name (e.g. Chicken & Rice)" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-slate-900 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:bg-white transition font-semibold">
                    
                    <div class="grid grid-cols-4 gap-2">
                        <div>
                            <label class="text-[10px] text-slate-400 font-bold block mb-1 text-center">kcal</label>
                            <input type="number" id="food-cal" placeholder="500" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-2 text-center text-slate-900 font-bold text-sm">
                        </div>
                        <div>
                            <label class="text-[10px] text-amber-600 font-bold block mb-1 text-center">P (g)</label>
                            <input type="number" id="food-p" step="0.1" placeholder="30" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-2 text-center text-slate-900 font-bold text-sm">
                        </div>
                        <div>
                            <label class="text-[10px] text-yellow-600 font-bold block mb-1 text-center">F (g)</label>
                            <input type="number" id="food-f" step="0.1" placeholder="10" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-2 text-center text-slate-900 font-bold text-sm">
                        </div>
                        <div>
                            <label class="text-[10px] text-blue-500 font-bold block mb-1 text-center">C (g)</label>
                            <input type="number" id="food-c" step="0.1" placeholder="50" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-2 text-center text-slate-900 font-bold text-sm">
                        </div>
                    </div>
                    <button onclick="saveDiet()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3.5 rounded-xl shadow-md active:scale-[0.98] transition tracking-wide uppercase">Add Meal</button>
                </div>
                
                <div class="bg-white p-5 rounded-2xl border border-slate-100 shadow-sm flex items-center justify-between">
                    <div class="w-1/2 flex justify-center"><canvas id="pfcChart" class="h-32 w-32"></canvas></div>
                    <div class="w-1/2 space-y-1 pl-4">
                        <p class="text-xs text-indigo-600 font-bold tracking-wide uppercase">Daily Total</p>
                        <p class="text-2xl text-slate-900 font-black tracking-tight"><span id="total-cal">0</span> <span class="text-xs font-normal text-slate-500">kcal</span></p>
                        <div class="grid grid-cols-3 gap-1 text-center text-[10px] font-bold mt-2">
                            <div class="bg-amber-50 p-1.5 rounded-lg border border-amber-100"><p class="text-amber-600">P</p><p id="total-p" class="text-slate-800 font-bold text-xs">0g</p></div>
                            <div class="bg-yellow-50 p-1.5 rounded-lg border border-yellow-100"><p class="text-yellow-600">F</p><p id="total-f" class="text-slate-800 font-bold text-xs">0g</p></div>
                            <div class="bg-blue-50 p-1.5 rounded-lg border border-blue-100"><p class="text-blue-500">C</p><p id="total-c" class="text-slate-800 font-bold text-xs">0g</p></div>
                        </div>
                    </div>
                </div>

                <div class="bg-white p-5 rounded-2xl border border-slate-100 shadow-sm space-y-3">
                    <h3 class="text-xs font-bold tracking-wider text-slate-400 uppercase">Meal Splits Summary</h3>
                    <div id="meal-slots-summary" class="grid grid-cols-2 gap-2 text-xs">
                        </div>
                </div>

                <div class="bg-white p-5 rounded-2xl border border-slate-100 shadow-sm space-y-3">
                    <h3 class="text-xs font-bold tracking-wider text-slate-400 uppercase">Today's Logs (Details)</h3>
                    <div id="meal-history-list" class="space-y-2 max-h-60 overflow-y-auto pr-1"></div>
                </div>
            </div>

            <div id="meal-sub-db" class="space-y-4 hidden">
                <div class="bg-white p-5 rounded-2xl border border-slate-100 shadow-sm space-y-4">
                    <h2 class="text-xs font-bold tracking-wider text-indigo-600 uppercase">Register Food To DB</h2>
                    <input type="text" id="db-food-name" placeholder="Food Name (e.g. 胸肉 精肉皮なし)" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-slate-900 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 font-semibold">
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="text-[10px] text-slate-500 font-bold block mb-1">Base Amount Unit</label>
                            <select id="db-food-unit" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-2.5 text-xs text-slate-800 font-semibold">
                                <option value="g">per 100g (100gあたり)</option>
                                <option value="pcs">per 1 pc (1個/1食あたり)</option>
                            </select>
                        </div>
                        <div>
                            <label class="text-[10px] text-slate-500 font-bold block mb-1">Calories (kcal)</label>
                            <input type="number" id="db-food-cal" placeholder="108" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-2 text-center text-slate-900 font-bold text-sm">
                        </div>
                    </div>
                    <div class="grid grid-cols-3 gap-2">
                        <div>
                            <label class="text-[10px] text-amber-600 font-bold block mb-1 text-center">Protein (g)</label>
                            <input type="number" id="db-food-p" step="0.1" placeholder="22.3" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-2 text-center text-slate-900 font-bold text-sm">
                        </div>
                        <div>
                            <label class="text-[10px] text-yellow-600 font-bold block mb-1 text-center">Fat (g)</label>
                            <input type="number" id="db-food-f" step="0.1" placeholder="1.5" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-2 text-center text-slate-900 font-bold text-sm">
                        </div>
                        <div>
                            <label class="text-[10px] text-blue-500 font-bold block mb-1 text-center">Carbs (g)</label>
                            <input type="number" id="db-food-c" step="0.1" placeholder="0.0" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-2 text-center text-slate-900 font-bold text-sm">
                        </div>
                    </div>
                    <button onclick="addFoodToDB()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3.5 rounded-xl shadow-md active:scale-[0.98] transition tracking-wide uppercase">Save To Database</button>
                </div>
                <div class="bg-white p-5 rounded-2xl border border-slate-100 shadow-sm space-y-3">
                    <h3 class="text-xs font-bold tracking-wider text-slate-400 uppercase">Your Custom Database</h3>
                    <div id="custom-db-list" class="space-y-2 max-h-60 overflow-y-auto pr-1"></div>
                </div>
            </div>
        </div>

    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-md border-t border-slate-200 flex justify-around items-center pt-2 safe-bottom shadow-lg z-50">
        <button onclick="switchTab('weight', 'WEIGHT LOG')" class="nav-btn flex flex-col items-center justify-center w-24 py-2 text-indigo-600" id="btn-weight">
            <span class="text-xl">⚖️</span>
            <span class="text-[10px] font-bold tracking-wider uppercase mt-1">WEIGHT</span>
        </button>
        <button onclick="switchTab('training', 'TRAINING LOG')" class="nav-btn flex flex-col items-center justify-center w-24 py-2 text-slate-400" id="btn-training">
            <span class="text-xl">💪</span>
            <span class="text-[10px] font-bold tracking-wider uppercase mt-1">TRAINING</span>
        </button>
        <button onclick="switchTab('meal', 'MEAL LOG')" class="nav-btn flex flex-col items-center justify-center w-24 py-2 text-slate-400" id="btn-meal">
            <span class="text-xl">🥗</span>
            <span class="text-[10px] font-bold tracking-wider uppercase mt-1">MEAL</span>
        </button>
    </nav>

    <script>
        let db = JSON.parse(localStorage.getItem('habits_db')) || { weight: [], gym: {}, diet: [], foodMaster: [] };
        if (!db.foodMaster) { db.foodMaster = []; }
        if (Array.isArray(db.gym)) { db.gym = {}; }
        
        let weightChart, pfcChart;
        let selectedCategories = new Set();

        const defaultPresets = [
            { id: "p1", name: "鶏むね肉 (皮なし精肉)", unit: "g", cal: 108, p: 22, f: 1.5, c: 0 },
            { id: "p2", name: "白米 (炊きあがり)", unit: "g", cal: 156, p: 2.5, f: 0.3, c: 35.6 },
            { id: "p3", name: "全卵 (生)", unit: "pcs", cal: 76, p: 6.2, f: 5.2, c: 0.2 },
            { id: "p4", name: "ホエイプロテイン", unit: "pcs", cal: 120, p: 24, f: 1.5, c: 3 },
            { id: "p5", name: "ブロッコリー", unit: "g", cal: 37, p: 4.3, f: 0.5, c: 6.6 }
        ];

        function getFullFoodDB() { return [...defaultPresets, ...db.foodMaster]; }
        function saveLog() { localStorage.setItem('habits_db', JSON.stringify(db)); }
        function getToday() { return new Date().toISOString().split('T')[0]; }

        function switchTab(tabId, title) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.getElementById(`tab-${tabId}`).classList.remove('hidden');
            document.getElementById('page-title').innerText = title;
            document.querySelectorAll('.nav-btn').forEach(el => el.classList.replace('text-indigo-600', 'text-slate-400'));
            document.getElementById(`btn-${tabId}`).classList.replace('text-slate-400', 'text-indigo-600');
            
            if(tabId === 'weight') initWeightChart();
            if(tabId === 'meal') switchMealSubTab('log');
        }

        function switchMealSubTab(subTab) {
            if(subTab === 'log') {
                document.getElementById('meal-sub-log').classList.remove('hidden');
                document.getElementById('meal-sub-db').classList.add('hidden');
                document.getElementById('sub-btn-log').className = "flex-1 py-2 rounded-lg text-xs font-bold transition bg-white text-indigo-600 shadow-sm";
                document.getElementById('sub-btn-db').className = "flex-1 py-2 rounded-lg text-xs font-bold transition text-slate-500";
                updateFoodPresetSelect();
                initPfcChart();
            } else {
                document.getElementById('meal-sub-log').classList.add('hidden');
                document.getElementById('meal-sub-db').classList.remove('hidden');
                document.getElementById('sub-btn-log').className = "flex-1 py-2 rounded-lg text-xs font-bold transition text-slate-500";
                document.getElementById('sub-btn-db').className = "flex-1 py-2 rounded-lg text-xs font-bold transition bg-white text-indigo-600 shadow-sm";
                updateCustomDBList();
            }
        }

        // WEIGHT
        function saveWeight() {
            const w = parseFloat(document.getElementById('weight-input').value);
            if(!w) return alert('数値を入力してください');
            db.weight.push({ date: getToday(), value: w });
            saveLog();
            initWeightChart();
            document.getElementById('weight-input').value = '';
            alert('体重を記録しました！');
        }

        function initWeightChart() {
            const ctx = document.getElementById('weightChart').getContext('2d');
            if(weightChart) weightChart.destroy();
            const last7 = db.weight.slice(-7);
            weightChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: last7.map(d => d.date.slice(5)),
                    datasets: [{ label: 'Weight (kg)', data: last7.map(d => d.value), borderColor: '#4f46e5', backgroundColor: 'rgba(79, 70, 229, 0.05)', fill: true, tension: 0.3, borderWidth: 3, pointBackgroundColor: '#4f46e5' }]
                },
                options: { responsive: true, maintainAspectRatio: false, scales: { x: { grid: { color: '#f1f5f9' } }, y: { grid: { color: '#f1f5f9' } } } }
            });
        }

        // TRAINING
        function toggleCategory(cat) {
            const btn = document.getElementById(`cat-${cat}`);
            if (selectedCategories.has(cat)) {
                selectedCategories.delete(cat);
                btn.className = "py-3 px-2 rounded-xl border border-slate-200 font-bold text-xs tracking-wider uppercase bg-slate-50 text-slate-600 active:scale-[0.95] transition";
            } else {
                selectedCategories.add(cat);
                btn.className = "py-3 px-2 rounded-xl border border-indigo-500 font-bold text-xs tracking-wider uppercase bg-indigo-600 text-white active:scale-[0.95] transition";
            }
            updateFieldVisibility();
        }

        function updateFieldVisibility() {
            const weightParts = ['chest', 'shoulder', 'back', 'triceps', 'biceps', 'legs'];
            const hasWeightSelected = weightParts.some(part => selectedCategories.has(part));
            const hasRunningSelected = selectedCategories.has('running');
            document.getElementById('weight-fields').style.display = hasWeightSelected ? 'block' : 'none';
            document.getElementById('running-fields').style.display = hasRunningSelected ? 'block' : 'none';
        }

        function saveTraining() {
            if (selectedCategories.size === 0) return alert('メニューを選択してください');
            const today = getToday();
            const logEntry = { parts: Array.from(selectedCategories), sets: null, running: null };

            const weightParts = ['chest', 'shoulder', 'back', 'triceps', 'biceps', 'legs'];
            if (weightParts.some(part => selectedCategories.has(part))) {
                const sets = parseInt(document.getElementById('workout-sets').value);
                if (!sets) return alert('総セット数を入力してください');
                logEntry.sets = sets;
            }
            if (selectedCategories.has('running')) {
                const dist = parseFloat(document.getElementById('run-distance').value);
                const time = document.getElementById('run-time').value;
                const pace = document.getElementById('run-pace').value;
                if (!dist || !time) return alert('ランニングの距離と時間を入力してください');
                logEntry.running = { distance: dist, time: time, pace: pace };
            }

            db.gym[today] = logEntry;
            saveLog();
            updateGymUI();
            
            selectedCategories.clear();
            document.querySelectorAll('[id^="cat-"]').forEach(btn => {
                btn.className = "py-3 px-2 rounded-xl border border-slate-200 font-bold text-xs tracking-wider uppercase bg-slate-50 text-slate-600 transition";
            });
            document.getElementById('cat-running').className = "w-full py-3 rounded-xl border border-slate-200 font-bold text-xs tracking-wider uppercase bg-slate-50 text-slate-600 transition";
            document.getElementById('workout-sets').value = '';
            document.getElementById('run-distance').value = '';
            document.getElementById('run-time').value = '';
            document.getElementById('run-pace').value = '';
            updateFieldVisibility();
            alert('🔥 WORKOUT LOGGED!');
        }

        function updateGymUI() {
            const today = getToday();
            const status = document.getElementById('gym-status');
            if(db.gym[today]) {
                const entry = db.gym[today];
                let summary = `🔥 DONE: ${entry.parts.join(', ').toUpperCase()}`;
                if (entry.sets) summary += ` (${entry.sets} sets)`;
                if (entry.running) summary += ` | 🏃 ${entry.running.distance}km`;
                status.innerText = summary;
                status.className = "text-emerald-600 font-bold text-xs tracking-wide uppercase";
            } else {
                status.innerText = "No Workout Logged Today";
                status.className = "text-slate-400 font-bold text-xs tracking-wide uppercase";
            }
        }

        // ② 食品DB管理
        function addFoodToDB() {
            const name = document.getElementById('db-food-name').value;
            const unit = document.getElementById('db-food-unit').value;
            const cal = parseInt(document.getElementById('db-food-cal').value) || 0;
            const p = parseFloat(document.getElementById('db-food-p').value) || 0;
            const f = parseFloat(document.getElementById('db-food-f').value) || 0;
            const c = parseFloat(document.getElementById('db-food-c').value) || 0;
            if(!name) return alert('食品名を入力してください');

            db.foodMaster.push({ id: 'c_' + Date.now(), name, unit, cal, p, f, c });
            saveLog();
            document.getElementById('db-food-name').value = '';
            document.getElementById('db-food-cal').value = '';
            document.getElementById('db-food-p').value = '';
            document.getElementById('db-food-f').value = '';
            document.getElementById('db-food-c').value = '';
            updateCustomDBList();
            alert('🎉 食品データベースに登録しました！');
        }

        function deleteDBFood(id) {
            if(confirm('マスタからこの食品を削除しますか？')) {
                db.foodMaster = db.foodMaster.filter(f => f.id !== id);
                saveLog();
                updateCustomDBList();
            }
        }

        function updateCustomDBList() {
            const container = document.getElementById('custom-db-list');
            container.innerHTML = '';
            if (db.foodMaster.length === 0) {
                container.innerHTML = `<p class="text-xs text-slate-400 text-center py-2">No custom foods registered yet</p>`;
            } else {
                db.foodMaster.forEach(item => {
                    const div = document.createElement('div');
                    div.className = "flex items-center justify-between bg-slate-50 p-2.5 rounded-xl border border-slate-100 text-xs text-slate-700";
                    div.innerHTML = `
                        <div class="flex-1 min-w-0 pr-2">
                            <p class="font-bold text-slate-800 truncate">${item.name}</p>
                            <p class="text-[10px] text-slate-400">${item.cal}kcal (P:${item.p} F:${item.f} C:${item.c}) / ${item.unit === 'g' ? '100g' : '1個'}</p>
                        </div>
                        <button onclick="deleteDBFood('${item.id}')" class="text-slate-300 hover:text-red-500 font-bold text-sm px-1">✕</button>
                    `;
                    container.appendChild(div);
                });
            }
        }

        // ① 食事記録（Meal1~6対応版）
        function updateFoodPresetSelect() {
            const select = document.getElementById('food-preset');
            select.innerHTML = '<option value="">-- 直接手入力する --</option>';
            getFullFoodDB().forEach(food => {
                const unitText = food.unit === 'g' ? '100gあたり' : '1食/1個あたり';
                const option = document.createElement('option');
                option.value = food.id;
                option.innerText = `${food.name}`;
                select.appendChild(option);
            });
            document.getElementById('food-amount').value = 100;
        }

        function onPresetChange() {
            const foodId = document.getElementById('food-preset').value;
            const unitLabel = document.getElementById('amount-unit');
            if(!foodId) {
                document.getElementById('food-name').value = '';
                document.getElementById('food-cal').value = '';
                document.getElementById('food-p').value = '';
                document.getElementById('food-f').value = '';
                document.getElementById('food-c').value = '';
                return;
            }
            const food = getFullFoodDB().find(f => f.id === foodId);
            if(food) {
                document.getElementById('food-name').value = food.name;
                unitLabel.innerText = food.unit === 'g' ? 'g' : '個/食';
                document.getElementById('food-amount').value = food.unit === 'g' ? 100 : 1;
                calculateMacrosByAmount();
            }
        }

        function calculateMacrosByAmount() {
            const foodId = document.getElementById('food-preset').value;
            if(!foodId) return;
            const food = getFullFoodDB().find(f => f.id === foodId);
            const amount = parseFloat(document.getElementById('food-amount').value) || 0;
            if(food) {
                const factor = food.unit === 'g' ? (amount / 100) : amount;
                document.getElementById('food-cal').value = Math.round(food.cal * factor);
                document.getElementById('food-p').value = (Math.round((food.p * factor) * 10) / 10).toFixed(1);
                document.getElementById('food-f').value = (Math.round((food.f * factor) * 10) / 10).toFixed(1);
                document.getElementById('food-c').value = (Math.round((food.c * factor) * 10) / 10).toFixed(1);
            }
        }

        function saveDiet() {
            const slot = document.getElementById('food-meal-slot').value; // Meal 1 ~ Meal 6
            const menu = document.getElementById('food-name').value;
            const cal = Math.round(parseFloat(document.getElementById('food-cal').value)) || 0;
            const p = Math.round(parseFloat(document.getElementById('food-p').value * 10)) / 10 || 0;
            const f = Math.round(parseFloat(document.getElementById('food-f').value * 10)) / 10 || 0;
            const c = Math.round(parseFloat(document.getElementById('food-c').value * 10)) / 10 || 0;
            if(!menu) return alert('メニュー名を入力してください');
            
            db.diet.push({ id: Date.now(), date: getToday(), slot, menu, cal, p, f, c });
            saveLog();
            initPfcChart();
            
            document.getElementById('food-preset').value = '';
            document.getElementById('food-name').value = '';
            document.getElementById('food-cal').value = '';
            document.getElementById('food-p').value = '';
            document.getElementById('food-f').value = '';
            document.getElementById('food-c').value = '';
            document.getElementById('food-amount').value = 100;
            alert(`${slot} に食事を追加しました！`);
        }

        function deleteMeal(id) {
            if(confirm('この食事ログを削除しますか？')) {
                db.diet = db.diet.filter(d => d.id !== id);
                saveLog();
                initPfcChart();
            }
        }

        function initPfcChart() {
            const today = getToday();
            const todaysDiet = db.diet.filter(d => d.date === today);
            
            // 1日の総合計計算
            const total = todaysDiet.reduce((acc, cur) => ({
                cal: acc.cal + cur.cal, p: acc.p + cur.p, f: acc.f + cur.f, c: acc.c + cur.c
            }), { cal: 0, p: 0, f: 0, c: 0 });

            document.getElementById('total-cal').innerText = total.cal;
            document.getElementById('total-p').innerText = (Math.round(total.p * 10) / 10) + 'g';
            document.getElementById('total-f').innerText = (Math.round(total.f * 10) / 10) + 'g';
            document.getElementById('total-c').innerText = (Math.round(total.c * 10) / 10) + 'g';

            // 各Mealスロットごとの小計を初期化＆計算
            const slots = ["Meal 1", "Meal 2", "Meal 3", "Meal 4", "Meal 5", "Meal 6"];
            const slotTotals = {};
            slots.forEach(s => slotTotals[s] = { cal: 0, p: 0, f: 0, c: 0 });
            
            todaysDiet.forEach(item => {
                const s = item.slot || "Meal 1"; // 過去データ互換用
                if(slotTotals[s]) {
                    slotTotals[s].cal += item.cal;
                    slotTotals[s].p += item.p;
                    slotTotals[s].f += item.f;
                    slotTotals[s].c += item.c;
                }
            });

            // 各MealスロットのサマリーUIをレンダリング
            const summaryContainer = document.getElementById('meal-slots-summary');
            summaryContainer.innerHTML = '';
            slots.forEach(s => {
                const div = document.createElement('div');
                const t = slotTotals[s];
                div.className = "bg-slate-100/70 border border-slate-200/50 p-3 rounded-xl space-y-1";
                div.innerHTML = `
                    <div class="flex justify-between items-center border-b border-slate-200 pb-1 mb-1">
                        <span class="font-black text-slate-800 text-[11px] text-indigo-600">${s}</span>
                        <span class="font-extrabold text-slate-900 text-xs">${t.cal} kcal</span>
                    </div>
                    <div class="flex justify-between text-[9px] text-slate-500 font-semibold">
                        <span>P: <b class="text-amber-600">${Math.round(t.p*10)/10}g</b></span>
                        <span>F: <b class="text-yellow-600">${Math.round(t.f*10)/10}g</b></span>
                        <span>C: <b class="text-blue-500">${Math.round(t.c*10)/10}g</b></span>
                    </div>
                `;
                summaryContainer.appendChild(div);
            });

            // 本日の詳細履歴リストレンダリング
            const listContainer = document.getElementById('meal-history-list');
            listContainer.innerHTML = '';
            if (todaysDiet.length === 0) {
                listContainer.innerHTML = `<p class="text-xs text-slate-400 text-center py-2">No meals logged today</p>`;
            } else {
                // スロット（Meal 1~6）順にソートして並び替え
                todaysDiet.sort((a,b) => a.slot.localeCompare(b.slot)).forEach(item => {
                    const div = document.createElement('div');
                    div.className = "flex items-center justify-between bg-slate-50 p-2.5 rounded-xl border border-slate-100 text-xs text-slate-700";
                    div.innerHTML = `
                        <div class="flex-1 min-w-0 pr-2">
                            <div class="flex items-center space-x-2">
                                <span class="bg-indigo-50 text-indigo-600 text-[9px] font-bold px-1.5 py-0.5 rounded border border-indigo-100 shrink-0">${item.slot}</span>
                                <p class="font-bold text-slate-800 truncate">${item.menu}</p>
                            </div>
                            <p class="text-[10px] text-slate-400 mt-0.5">P:${item.p}g / F:${item.f}g / C:${item.c}g</p>
                        </div>
                        <div class="flex items-center space-x-3 flex-shrink-0">
                            <span class="font-extrabold text-slate-900">${item.cal} kcal</span>
                            <button onclick="deleteMeal(${item.id})" class="text-slate-300 hover:text-red-500 font-bold text-sm px-1">✕</button>
                        </div>
                    `;
                    listContainer.appendChild(div);
                });
            }

            // 円グラフ更新
            const ctx = document.getElementById('pfcChart').getContext('2d');
            if(pfcChart) pfcChart.destroy();
            pfcChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['P', 'F', 'C'],
                    datasets: [{ data: [total.p, total.f, total.c], backgroundColor: ['#f59e0b', '#eab308', '#3b82f6'], borderWidth: 2, borderColor: '#ffffff' }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, cutout: '75%' }
            });
        }

        window.onload = () => {
            initWeightChart();
            updateGymUI();
        };
    </script>
</body>
</html>
